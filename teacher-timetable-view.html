<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Class One Teacher Timetable</title>
  <style>
    :root {
      --mint: #72D0A1;
      --mint-dark: #24895d;
      --ink: #17212b;
      --muted: #667085;
      --line: #d7e5dd;
      --paper: #f4fbf7;
      --danger: #d92d20;
      --warning: #fff2a8;
      --blue: #dceafe;
      --purple: #e8dcff;
      --grey: #d0d5dd;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    button, input, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px clamp(14px, 4vw, 34px);
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand img { width: 142px; max-width: 36vw; height: auto; display: block; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(18px, 3vw, 26px); line-height: 1.1; }
    h2 { font-size: 18px; margin-bottom: 12px; }
    h3 { font-size: 15px; }
    main {
      width: min(1380px, 100%);
      margin: 0 auto;
      padding: 18px clamp(12px, 3vw, 28px) 40px;
    }
    .teacher-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      color: var(--mint-dark);
      font-weight: 800;
      white-space: nowrap;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr)) auto;
      gap: 12px;
      align-items: end;
      margin: 16px 0;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    select, input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }
    .btn {
      min-height: 42px;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--mint);
      color: #0f3324;
      font-weight: 900;
      transition: transform .12s ease, filter .12s ease;
    }
    .btn:active { transform: translateY(1px) scale(.98); filter: brightness(.97); }
    .status {
      margin: 12px 0;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 14px;
    }
    .status.error { border-color: #f1b4ae; background: #fff3f2; color: #912018; }
    .grid {
      display: grid;
      gap: 14px;
    }
    .metrics { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .metric {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .metric span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .metric strong { display: block; margin-top: 8px; font-size: 26px; }
    section {
      margin-top: 16px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .timetable-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    .teacher-timetable {
      min-width: 1060px;
      table-layout: fixed;
    }
    th, td {
      border: 1px solid #111;
      padding: 5px 6px;
      text-align: center;
      vertical-align: middle;
      font-size: 12px;
      line-height: 1.2;
    }
    th {
      background: #f59e0b;
      color: #111;
      font-weight: 900;
    }
    .time-col {
      width: 92px;
      background: #fff4cf;
      font-weight: 900;
    }
    .cell-off {
      background: #666;
      color: #d8d8d8;
      font-style: italic;
      font-weight: 900;
    }
    .cell-open { background: #fff; color: #98a2b3; }
    .cell-fixed, .cell-booking {
      background: #fff;
      color: #111;
      font-weight: 800;
    }
    .type-assessment, .type-exam, .type-trial-class, .type-new-students { background: var(--warning); }
    .type-replacement-class { background: var(--blue); }
    .type-extra-class { background: var(--purple); }
    .status-student-not-show { background: var(--danger); color: #fff; }
    .status-cancelled, .status-public-holiday, .status-teacher-leave { background: var(--grey); color: #111; }
    .cell-small {
      display: block;
      margin-top: 2px;
      color: inherit;
      font-size: 10px;
      font-weight: 700;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 10px;
    }
    .class-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: #fbfefd;
    }
    .class-card strong { display: block; margin-bottom: 4px; }
    .subtle { color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      background: #e8f8f0;
      color: var(--mint-dark);
      font-size: 11px;
      font-weight: 900;
    }
    .simple-table { min-width: 760px; }
    .simple-table th { background: #e8f8f0; }
    .simple-table td, .simple-table th { border-color: var(--line); text-align: left; }
    .hide { display: none !important; }
    @media (max-width: 860px) {
      .topbar { grid-template-columns: 1fr; }
      .teacher-chip { justify-self: start; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar .btn { grid-column: span 2; }
      .metrics { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 560px) {
      .toolbar, .metrics { grid-template-columns: 1fr; }
      .toolbar .btn { grid-column: auto; }
      .brand { align-items: flex-start; flex-direction: column; }
      section { padding: 12px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="classone-logo.jpeg" alt="Class One">
      <div>
        <h1>Teacher Timetable View</h1>
        <p class="subtle">Read-only monthly timetable</p>
      </div>
    </div>
    <div class="teacher-chip" id="teacherChip">Loading...</div>
  </header>

  <main>
    <div class="toolbar">
      <div><label>Month</label><select id="monthSelect"></select></div>
      <div><label>Year</label><select id="yearSelect"></select></div>
      <div><label>Week</label><select id="weekSelect"></select></div>
      <div><label>View</label><select id="viewSelect"><option value="week">Weekly Table</option><option value="list">Monthly List</option></select></div>
      <button class="btn" id="refreshBtn">Refresh</button>
    </div>

    <div class="status" id="statusText">Loading latest timetable...</div>

    <div class="grid metrics">
      <div class="metric"><span>Classes This Month</span><strong id="metricTotal">0</strong></div>
      <div class="metric"><span>Upcoming Next 7 Days</span><strong id="metricUpcoming">0</strong></div>
      <div class="metric"><span>Completed / Passed</span><strong id="metricCompleted">0</strong></div>
      <div class="metric"><span>Cancelled / Leave</span><strong id="metricCancelled">0</strong></div>
    </div>

    <section>
      <h2>Next 7 Days</h2>
      <div id="upcomingList" class="cards"></div>
    </section>

    <section id="weeklySection">
      <h2>Weekly Timetable</h2>
      <div id="weekTable" class="timetable-wrap"></div>
    </section>

    <section id="monthlySection">
      <h2>Selected Month Classes</h2>
      <div id="monthList" class="timetable-wrap"></div>
    </section>

    <section>
      <h2>Cancelled / Leave Summary</h2>
      <div id="leaveList" class="timetable-wrap"></div>
    </section>
  </main>

  <script>
    const API_BASE = "https://classone-booking-api-yiit.vercel.app";
    const STATE_KEY = "production";
    const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const STATUS_LABELS = {
      booked: "Booked",
      completed: "Completed",
      student_not_show: "Student Not Show",
      cancelled: "Cancelled",
      public_holiday: "Public Holiday",
      teacher_leave: "Teacher Leave"
    };
    const CANCELLED = ["cancelled", "public_holiday", "teacher_leave"];
    const $ = id => document.getElementById(id);
    const params = new URLSearchParams(window.location.search);
    let timetableData = null;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function localISO(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function parseISODate(value) {
      const [year, month, day] = String(value || "").split("-").map(Number);
      return new Date(year || new Date().getFullYear(), (month || 1) - 1, day || 1);
    }

    function dateOffsetISO(value, days) {
      const date = parseISODate(value);
      date.setDate(date.getDate() + days);
      return localISO(date);
    }

    function dateLabel(value) {
      const date = parseISODate(value);
      return date.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
    }

    function timeLabel(value) {
      const text = String(value || "");
      const match = text.match(/^(\d{1,2}):(\d{2})/);
      if (!match) return text;
      const hour = Number(match[1]);
      const minute = match[2];
      const suffix = hour >= 12 ? "PM" : "AM";
      const displayHour = hour % 12 || 12;
      return `${displayHour}:${minute} ${suffix}`;
    }

    function minutes(value) {
      const [hour, minute] = String(value || "00:00").split(":").map(Number);
      return (Number(hour) || 0) * 60 + (Number(minute) || 0);
    }

    function statusLabel(status) {
      return STATUS_LABELS[status] || status || "Booked";
    }

    function statusForDisplay(booking) {
      if (!booking) return "";
      if ((booking.status || "booked") === "booked" && slotHasPassed(booking.date, booking.time)) return "completed";
      return booking.status || "booked";
    }

    function statusClass(status) {
      return `status-${String(status || "booked").replace(/_/g, "-")}`;
    }

    function typeClass(type) {
      return `type-${String(type || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "")}`;
    }

    function slotDateTime(date, time) {
      return new Date(`${date}T${time || "00:00"}:00`);
    }

    function slotHasPassed(date, time) {
      return slotDateTime(date, time) < new Date();
    }

    function setStatus(message, type = "") {
      $("statusText").textContent = message;
      $("statusText").className = `status ${type}`.trim();
    }

    function teacherLinkErrorMessage(message) {
      if (/invalid|missing/i.test(message || "")) {
        return "This teacher timetable link is not active yet. Please ask admin to open Teachers > Edit Teacher > Generate under Teacher Timetable View Link, wait for the Neon sync success message, then copy/share the new link.";
      }
      return message;
    }

    function fillControls() {
      $("monthSelect").innerHTML = MONTHS.map((month, index) => `<option value="${index}">${month}</option>`).join("");
      const currentYear = new Date().getFullYear();
      $("yearSelect").innerHTML = Array.from({ length: 5 }, (_, index) => currentYear - 1 + index).map(year => `<option value="${year}">${year}</option>`).join("");
      const selectedMonth = Number(params.get("month") || new Date().getMonth());
      const selectedYear = Number(params.get("year") || currentYear);
      $("monthSelect").value = String(Math.max(0, Math.min(11, selectedMonth)));
      $("yearSelect").value = String(selectedYear);
      fillWeekSelect();
    }

    function mondayOf(date) {
      const copy = new Date(date);
      const day = (copy.getDay() + 6) % 7;
      copy.setDate(copy.getDate() - day);
      return copy;
    }

    function weekDates(startISO) {
      return Array.from({ length: 7 }, (_, index) => parseISODate(dateOffsetISO(startISO, index)));
    }

    function weeksForMonth(year, month) {
      const start = mondayOf(new Date(year, month, 1));
      const end = mondayOf(new Date(year, month + 1, 0));
      const weeks = [];
      for (let date = new Date(start); date <= end; date.setDate(date.getDate() + 7)) {
        weeks.push(localISO(date));
      }
      return weeks;
    }

    function fillWeekSelect() {
      const month = Number($("monthSelect").value);
      const year = Number($("yearSelect").value);
      const weeks = weeksForMonth(year, month);
      $("weekSelect").innerHTML = weeks.map(startISO => {
        const dates = weekDates(startISO);
        return `<option value="${startISO}">${dateLabel(localISO(dates[0]))} - ${dateLabel(localISO(dates[6]))}</option>`;
      }).join("");
      const today = new Date();
      const currentWeek = localISO(mondayOf(today));
      $("weekSelect").value = weeks.includes(currentWeek) ? currentWeek : weeks[0];
    }

    function selectedMonthRange() {
      const month = Number($("monthSelect").value);
      const year = Number($("yearSelect").value);
      const monthStart = new Date(year, month, 1);
      const monthEnd = new Date(year, month + 1, 0);
      const nextWeek = parseISODate(dateOffsetISO(localISO(new Date()), 7));
      const toDate = new Date(Math.max(monthEnd.getTime(), nextWeek.getTime()));
      return { from: localISO(monthStart), to: localISO(toDate), month, year };
    }

    async function loadTimetable() {
      const teacherId = params.get("teacherId") || params.get("teacher") || "";
      const token = params.get("token") || "";
      if (!teacherId || !token) {
        setStatus("Teacher timetable link is missing. Please ask admin to generate a teacher timetable view link.", "error");
        return;
      }
      const range = selectedMonthRange();
      const url = new URL(`${API_BASE}/api/teacher-view`);
      url.searchParams.set("key", STATE_KEY);
      url.searchParams.set("teacherId", teacherId);
      url.searchParams.set("token", token);
      url.searchParams.set("from", range.from);
      url.searchParams.set("to", range.to);
      setStatus("Loading latest timetable...");
      const response = await fetch(url.toString(), { method: "GET" });
      const data = await response.json();
      if (!response.ok || data.ok === false) throw new Error(teacherLinkErrorMessage(data.error || `Load failed with HTTP ${response.status}`));
      timetableData = data;
      $("teacherChip").textContent = data.teacher.name || "Teacher";
      setStatus(`Loaded latest timetable. Last updated: ${data.updatedAt ? new Date(data.updatedAt).toLocaleString() : "-"}`);
      renderAll();
    }

    function collectSlotsForDate(date) {
      if (!timetableData) return [];
      const dateStr = localISO(date);
      const day = DAYS[(date.getDay() + 6) % 7];
      const regularSlots = timetableData.regularSlots || [];
      const overrideSlots = timetableData.overrideSlots || [];
      const offOverrides = overrideSlots.filter(slot => slot.date === dateStr && slot.unavailable);
      const regular = regularSlots
        .filter(slot => slot.day === day)
        .filter(slot => (!slot.startDate || slot.startDate <= dateStr) && (!slot.endDate || slot.endDate >= dateStr))
        .filter(slot => !offOverrides.some(off => off.time === slot.time))
        .map(slot => ({ ...slot, date: dateStr, source: slot.source || "regular" }));
      const overrides = overrideSlots
        .filter(slot => slot.date === dateStr && !slot.unavailable)
        .map(slot => ({ ...slot, date: dateStr, source: "override" }));
      return [...regular, ...overrides];
    }

    function scheduleBookings() {
      return (timetableData?.bookings || []).filter(booking => booking.status !== "deleted");
    }

    function findBooking(dateISO, time) {
      return scheduleBookings().find(booking => booking.date === dateISO && booking.time === time);
    }

    function weekTimes(dates) {
      const values = new Set();
      for (let total = 8 * 60; total <= 21 * 60 + 30; total += 30) {
        values.add(`${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`);
      }
      dates.forEach(date => {
        const dateISO = localISO(date);
        collectSlotsForDate(date).forEach(slot => values.add(slot.time));
        scheduleBookings().filter(booking => booking.date === dateISO).forEach(booking => values.add(booking.time));
      });
      return [...values].sort((a, b) => minutes(a) - minutes(b));
    }

    function cellHtml(date, time) {
      const dateISO = localISO(date);
      const booking = findBooking(dateISO, time);
      if (booking) {
        const displayStatus = statusForDisplay(booking);
        return `<td class="cell-booking ${typeClass(booking.type)} ${statusClass(displayStatus)}">${escapeHtml(booking.studentName || "Class")}${booking.subject ? ` (${escapeHtml(booking.subject)})` : ""}<span class="cell-small">${escapeHtml(statusLabel(displayStatus))} | ${escapeHtml(booking.type || "class")}</span></td>`;
      }
      const slot = collectSlotsForDate(date).find(item => item.time === time);
      if (slot?.locked) {
        return `<td class="cell-fixed">${escapeHtml(slot.studentName || "Fixed Regular")}${slot.subject ? ` (${escapeHtml(slot.subject)})` : ""}<span class="cell-small">Fixed regular</span></td>`;
      }
      if (slot) return `<td class="cell-open"><span class="cell-small">${escapeHtml(slot.subject || "Open")}</span></td>`;
      return `<td class="cell-off">OFF</td>`;
    }

    function renderWeekTable() {
      const dates = weekDates($("weekSelect").value);
      const times = weekTimes(dates);
      const header = `<tr><th class="time-col">Time</th>${dates.map(date => `<th>${DAYS[(date.getDay() + 6) % 7].slice(0, 3)}<br><span>${date.toLocaleDateString("en-GB", { day: "2-digit", month: "short" })}</span></th>`).join("")}</tr>`;
      const rows = times.map(time => `<tr><td class="time-col">${timeLabel(time)}</td>${dates.map(date => cellHtml(date, time)).join("")}</tr>`).join("");
      $("weekTable").innerHTML = `<table class="teacher-timetable"><thead>${header}</thead><tbody>${rows}</tbody></table>`;
    }

    function classEntries(fromISO, toISO) {
      const entries = [];
      for (let dateISO = fromISO; dateISO <= toISO; dateISO = dateOffsetISO(dateISO, 1)) {
        const date = parseISODate(dateISO);
        const slots = collectSlotsForDate(date);
        const bookings = scheduleBookings().filter(booking => booking.date === dateISO);
        bookings.forEach(booking => entries.push({ kind: "booking", date: dateISO, time: booking.time, booking }));
        slots
          .filter(slot => slot.locked)
          .filter(slot => !bookings.some(booking => booking.time === slot.time))
          .forEach(slot => entries.push({ kind: "fixed", date: dateISO, time: slot.time, slot }));
      }
      return entries.sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
    }

    function entryMeta(entry) {
      if (entry.kind === "booking") {
        const status = statusForDisplay(entry.booking);
        return {
          studentName: entry.booking.studentName || "Class",
          subject: entry.booking.subject || "",
          type: entry.booking.type || "class",
          status,
          remark: entry.booking.remark || ""
        };
      }
      return {
        studentName: entry.slot.studentName || "Fixed Regular",
        subject: entry.slot.subject || "",
        type: "regular class",
        status: slotHasPassed(entry.date, entry.time) ? "completed" : "booked",
        remark: ""
      };
    }

    function renderUpcoming() {
      const from = localISO(new Date());
      const to = dateOffsetISO(from, 7);
      const entries = classEntries(from, to).filter(entry => !CANCELLED.includes(entryMeta(entry).status));
      $("metricUpcoming").textContent = entries.length;
      $("upcomingList").innerHTML = entries.slice(0, 12).map(entry => {
        const meta = entryMeta(entry);
        return `<div class="class-card">
          <strong>${escapeHtml(meta.studentName)} ${meta.subject ? `(${escapeHtml(meta.subject)})` : ""}</strong>
          <div class="subtle">${dateLabel(entry.date)} | ${timeLabel(entry.time)}</div>
          <span class="pill">${escapeHtml(meta.type)}</span>
        </div>`;
      }).join("") || `<div class="subtle">No upcoming classes in the next 7 days.</div>`;
    }

    function tableHtml(headers, rows) {
      return `<table class="simple-table"><thead><tr>${headers.map(header => `<th>${escapeHtml(header)}</th>`).join("")}</tr></thead><tbody>${rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
    }

    function renderMonthList() {
      const { from, month, year } = selectedMonthRange();
      const monthEnd = localISO(new Date(year, month + 1, 0));
      const entries = classEntries(from, monthEnd);
      const rows = entries.map((entry, index) => {
        const meta = entryMeta(entry);
        return [
          String(index + 1),
          escapeHtml(dateLabel(entry.date)),
          escapeHtml(timeLabel(entry.time)),
          escapeHtml(meta.studentName),
          escapeHtml(meta.subject),
          escapeHtml(meta.type),
          escapeHtml(statusLabel(meta.status)),
          escapeHtml(meta.remark)
        ];
      });
      $("monthList").innerHTML = rows.length ? tableHtml(["No.", "Date", "Time", "Student", "Subject", "Type", "Status", "Remark"], rows) : `<div class="subtle" style="padding:12px;">No classes in selected month.</div>`;
      $("metricTotal").textContent = entries.length;
      $("metricCompleted").textContent = entries.filter(entry => entryMeta(entry).status === "completed").length;
      $("metricCancelled").textContent = entries.filter(entry => CANCELLED.includes(entryMeta(entry).status)).length;
    }

    function renderLeaveList() {
      const { from, month, year } = selectedMonthRange();
      const monthEnd = localISO(new Date(year, month + 1, 0));
      const rows = classEntries(from, monthEnd)
        .filter(entry => CANCELLED.includes(entryMeta(entry).status) || entryMeta(entry).status === "student_not_show")
        .map((entry, index) => {
          const meta = entryMeta(entry);
          return [
            String(index + 1),
            escapeHtml(dateLabel(entry.date)),
            escapeHtml(timeLabel(entry.time)),
            escapeHtml(meta.studentName),
            escapeHtml(meta.subject),
            escapeHtml(statusLabel(meta.status)),
            escapeHtml(meta.remark)
          ];
        });
      $("leaveList").innerHTML = rows.length ? tableHtml(["No.", "Date", "Time", "Student", "Subject", "Status", "Remark"], rows) : `<div class="subtle" style="padding:12px;">No cancelled, leave, public holiday, or not-show records in selected month.</div>`;
    }

    function renderVisibility() {
      const weekly = $("viewSelect").value === "week";
      $("weeklySection").classList.toggle("hide", !weekly);
      $("monthlySection").classList.toggle("hide", weekly);
    }

    function renderAll() {
      if (!timetableData) return;
      renderWeekTable();
      renderUpcoming();
      renderMonthList();
      renderLeaveList();
      renderVisibility();
    }

    $("monthSelect").addEventListener("change", () => { fillWeekSelect(); loadTimetable().catch(error => setStatus(error.message, "error")); });
    $("yearSelect").addEventListener("change", () => { fillWeekSelect(); loadTimetable().catch(error => setStatus(error.message, "error")); });
    $("weekSelect").addEventListener("change", renderWeekTable);
    $("viewSelect").addEventListener("change", renderVisibility);
    $("refreshBtn").addEventListener("click", () => loadTimetable().catch(error => setStatus(error.message, "error")));

    fillControls();
    loadTimetable().catch(error => setStatus(error.message, "error"));
  </script>
</body>
</html>
