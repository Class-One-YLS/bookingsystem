  <script>
    const SUBJECTS = ["CN", "BM", "PK", "SOK", "CREATIVE MATHS", "PHONICS"];
    const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    const BOOKING_TYPES = ["exam", "assessment", "trial class", "replacement class", "reserve", "new students", "regular class"];
    const STORE_KEY = "classOneBookingRevamp.v1";
    const state = {
      teachers: [],
      students: [],
      bookings: [],
      settings: { scriptUrl: "", apiKey: "" }
    };
    let studentRegularSlotsDraft = [];
    const $ = (id) => document.getElementById(id);
    const uid = (prefix) => prefix + "_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    const localISO = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    const parseISODate = (value) => {
      const [y, m, d] = String(value).split("-").map(Number);
      return new Date(y, (m || 1) - 1, d || 1);
    };
    const todayISO = () => localISO(new Date());
    const timeLabel = (t) => {
      if (!t) return "";
      const [hh, mm] = t.split(":").map(Number);
      const suffix = hh >= 12 ? "PM" : "AM";
      const h = ((hh + 11) % 12) + 1;
      return `${h}:${String(mm || 0).padStart(2, "0")} ${suffix}`;
    };
    const minutes = (t) => {
      const [h, m] = String(t || "00:00").split(":").map(Number);
      return h * 60 + m;
    };
    const teacherById = (id) => state.teachers.find(t => t.id === id);
    const studentById = (id) => state.students.find(s => s.id === id);
    const escapeHtml = (text) => String(text ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));

    function load() {
      const saved = localStorage.getItem(STORE_KEY);
      if (saved) Object.assign(state, JSON.parse(saved));
      $("scriptUrl").value = state.settings.scriptUrl || "";
      $("apiKey").value = state.settings.apiKey || "";
      archivePast(false);
    }

    function save(show = true) {
      state.settings.scriptUrl = $("scriptUrl").value.trim();
      state.settings.apiKey = $("apiKey").value.trim();
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      if (show) setStatus("Saved.");
      renderAll();
    }

    function setStatus(msg) { $("statusText").textContent = msg; }

    function fillSelect(el, values, allLabel) {
      el.innerHTML = (allLabel ? `<option value="all">${allLabel}</option>` : "") + values.map(v => `<option value="${escapeHtml(v.value ?? v)}">${escapeHtml(v.label ?? v)}</option>`).join("");
    }

    function hydrateSelects() {
      const teacherOptions = state.teachers.map(t => ({ value: t.id, label: `${t.name} (${(t.subjects || []).join(", ") || "No subject"})` }));
      const studentOptions = state.students.map(s => ({ value: s.id, label: s.name }));
      ["monthSelect", "reportMonth"].forEach(id => fillSelect($(id), Array.from({ length: 12 }, (_, i) => ({ value: i, label: new Date(2026, i, 1).toLocaleString("en", { month: "long" }) }))));
      ["teacherFilter"].forEach(id => fillSelect($(id), teacherOptions, "All Teachers"));
      ["overviewTeacherFilter"].forEach(id => fillSelect($(id), teacherOptions, "Choose Teacher"));
      ["slotTeacher", "bulkTeacher", "overrideTeacher", "studentTeacher", "reportTeacher"].forEach(id => fillSelect($(id), teacherOptions));
      ["subjectFilter", "overviewSubjectFilter"].forEach(id => fillSelect($(id), SUBJECTS, "All Subjects"));
      ["slotSubject", "bulkSubject", "overrideSubject", "studentSubject", "studentRegularSubject", "bookingSubject"].forEach(id => fillSelect($(id), SUBJECTS));
      fillSelect($("bookingType"), BOOKING_TYPES);
      fillSelect($("bookingStudent"), studentOptions, "Choose or type name");
      fillSelect($("slotDay"), DAYS);
      $("studentDayChecks").innerHTML = DAYS.map(day => `<label class="pill"><input type="checkbox" value="${day}" style="width:auto;min-height:0;margin-right:6px;"> ${day.slice(0, 3)}</label>`).join("");
      $("teacherSubjects").innerHTML = SUBJECTS.map(s => `<label class="pill"><input type="checkbox" value="${s}" style="width:auto;min-height:0;margin-right:6px;"> ${s}</label>`).join("");
    }

    function setupMonths() {
      const now = new Date();
      $("monthSelect").value = now.getMonth();
      $("reportMonth").value = now.getMonth();
      $("yearInput").value = now.getFullYear();
      $("reportYear").value = now.getFullYear();
      refreshWeeks();
      const monday = new Date(now);
      monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
      const currentWeekValue = localISO(monday);
      if ([...$("weekSelect").options].some(o => o.value === currentWeekValue)) $("weekSelect").value = currentWeekValue;
    }

    function refreshWeeks() {
      const y = Number($("yearInput").value);
      const m = Number($("monthSelect").value);
      const weeks = [];
      const cursor = new Date(y, m, 1);
      cursor.setDate(cursor.getDate() - ((cursor.getDay() + 6) % 7));
      while (cursor.getMonth() <= m || weeks.length === 0) {
        const start = new Date(cursor);
        const end = new Date(cursor);
        end.setDate(end.getDate() + 6);
        weeks.push({ value: localISO(start), label: `${start.toLocaleDateString("en-GB", { day: "2-digit", month: "short" })} - ${end.toLocaleDateString("en-GB", { day: "2-digit", month: "short" })}` });
        cursor.setDate(cursor.getDate() + 7);
        if (cursor.getFullYear() > y && m < 11) break;
        if (weeks.length > 6) break;
      }
      fillSelect($("weekSelect"), weeks);
    }

    function weekDates() {
      const start = parseISODate($("weekSelect").value);
      return DAYS.map((_, i) => {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        return d;
      });
    }

    function collectSlotsForDate(date) {
      const dateStr = localISO(date);
      const day = DAYS[(date.getDay() + 6) % 7];
      const slots = [];
      state.teachers.forEach(t => {
        (t.regularSlots || []).filter(s => s.day === day).forEach(s => slots.push({ ...s, id: s.id, teacherId: t.id, date: dateStr, source: s.source || "regular" }));
        (t.overrideSlots || []).filter(s => s.date === dateStr).forEach(s => slots.push({ ...s, id: s.id, teacherId: t.id, date: dateStr, source: "override" }));
      });
      return slots;
    }

    function activeBookings() {
      return state.bookings.filter(b => !b.archived && b.status !== "cancelled");
    }

    function findBooking(slot) {
      return activeBookings().find(b => b.teacherId === slot.teacherId && b.date === slot.date && b.time === slot.time);
    }

    function slotMatchesSubject(slot, subjectFilter) {
      if (subjectFilter === "all") return true;
      const teacher = teacherById(slot.teacherId);
      return slot.subject === subjectFilter || (teacher && (teacher.subjects || []).includes(subjectFilter));
    }

    function slotMatchesTimeRange(slot, from, to) {
      const value = minutes(slot.time);
      return (!from || value >= minutes(from)) && (!to || value < minutes(to));
    }

    function renderSchedule() {
      const dates = weekDates();
      const times = new Set();
      dates.flatMap(collectSlotsForDate).forEach(s => times.add(s.time));
      activeBookings().forEach(b => {
        if (dates.some(d => localISO(d) === b.date)) times.add(b.time);
      });
      const sortedTimes = [...times].sort((a, b) => minutes(a) - minutes(b));
      const summary = { open: 0, booked: 0, fixed: 0, visibleTeachers: new Set() };
      let html = `<div class="cell head"></div>${dates.map(d => `<div class="cell head">${DAYS[(d.getDay() + 6) % 7].slice(0, 3)}<br><span class="subtle">${d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" })}</span></div>`).join("")}`;
      sortedTimes.forEach(t => {
        html += `<div class="cell time-cell">${timeLabel(t)}</div>`;
        dates.forEach(d => {
          const teacherFilter = $("teacherFilter").value;
          const subjectFilter = $("subjectFilter").value;
          const statusFilter = $("statusFilter").value;
          const timeFrom = $("timeFromFilter").value;
          const timeTo = $("timeToFilter").value;
          let slots = collectSlotsForDate(d).filter(s => s.time === t);
          slots = slots.filter(s => teacherFilter === "all" || s.teacherId === teacherFilter);
          slots = slots.filter(s => slotMatchesSubject(s, subjectFilter));
          slots = slots.filter(s => slotMatchesTimeRange(s, timeFrom, timeTo));
          const items = slots.map(s => ({ slot: s, booking: findBooking(s) }));
          let filtered = items.filter(x => {
            const isBooked = Boolean(x.booking || x.slot.locked);
            return statusFilter === "all" || (statusFilter === "open" && !isBooked) || (statusFilter === "booked" && isBooked);
          });
          filtered.forEach(x => {
            summary.visibleTeachers.add(x.slot.teacherId);
            if (x.booking) summary.booked += 1;
            else if (x.slot.locked) summary.fixed += 1;
            else summary.open += 1;
          });
          html += `<div class="cell">${filtered.map(x => slotHtml(x.slot, x.booking)).join("") || ""}</div>`;
        });
      });
      $("scheduleGrid").innerHTML = html || `<div class="empty">No slots yet.</div>`;
      renderSalesSummary(summary);
    }

    function renderTeacherOverview() {
